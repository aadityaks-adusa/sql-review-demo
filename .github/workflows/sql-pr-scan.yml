name: SQL PR Review — Detect · Reason · Enforce

on:
  pull_request:
    paths: ["**/*.sql"]
    branches: [main]
    types: [opened, synchronize, reopened]

# Permissions required for posting reviews, labels, and calling GitHub Models
permissions:
  contents: read
  pull-requests: write
  issues: write
  models: read

jobs:
  sql-review:
    name: sql-review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # STEP 1 — Detect: deterministic regex scanner → findings.json
      # -----------------------------------------------------------------------
      - name: "Step 1 — Detect (sql_pr_scan.py)"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SQL_SCAN_FINDINGS_FILE: /tmp/findings.json
        run: python3 .github/scripts/sql_pr_scan.py

      # -----------------------------------------------------------------------
      # STEP 2 — Reason: LLM reads findings + diff → review.json
      # Uses GitHub Models API (gpt-4o-mini) with the built-in GITHUB_TOKEN
      # Falls back to scanner output if API is unavailable
      # -----------------------------------------------------------------------
      - name: "Step 2 — Reason (llm_reason.py)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SQL_SCAN_FINDINGS_FILE: /tmp/findings.json
          SQL_SCAN_REVIEW_FILE: /tmp/review.json
        run: python3 .github/scripts/llm_reason.py

      # -----------------------------------------------------------------------
      # STEP 3 — Enforce: post review, add labels, fail check if HARD_BLOCK
      # Runs even if step 2 fails (uses fallback output)
      # -----------------------------------------------------------------------
      - name: "Step 3 — Enforce (enforce.py)"
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQL_SCAN_FINDINGS_FILE: /tmp/findings.json
          SQL_SCAN_REVIEW_FILE: /tmp/review.json
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/enforce.py
