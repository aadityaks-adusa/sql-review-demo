# Owned by ADUSA-Digital Platform Engineering
# Version: 4.0.1 — May 2026
# SQL PR review pipeline — Copilot is the sole reviewer.
#
# Architecture (single source of truth = Copilot):
#   1. PR opened on `.sql` files → Copilot is auto-requested by the ruleset.
#   2. This workflow polls every 20s for up to 10min waiting for Copilot's review.
#   3. When Copilot's review arrives → process_copilot_review.py parses it,
#      applies the tier label, and posts the "SQL Review Tier" status check.
#
# Why polling instead of pull_request_review trigger?
#   GitHub requires manual approval for workflows triggered by bot accounts
#   (copilot-pull-request-reviewer[bot]). Polling within the pull_request
#   workflow runs in the trusted PR-author context, no approval needed.
#
# This workflow NEVER posts comments or reviews on the PR — only labels + status.

name: sql-pr-scan

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
    paths:
      - '**/*.sql'

permissions:
  contents: read
  pull-requests: write    # request Copilot reviewer + read reviews
  issues: write           # add/remove tier labels
  statuses: write         # post "SQL Review Tier" commit status

jobs:
  copilot-review-gate:
    name: SQL Review Tier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set status check to pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              context: 'SQL Review Tier',
              state: 'pending',
              description: '⏳ Waiting for Copilot to submit review',
            });

      - name: Request Copilot as reviewer
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_REVIEWER_PAT }}
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['Copilot'],
              });
              core.info('✅ Copilot review requested');
            } catch (err) {
              core.warning('Could not request Copilot via API: ' + err.message);
            }

      - name: Wait for Copilot review
        id: wait
        uses: actions/github-script@v7
        with:
          script: |
            const pr      = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            const maxAttempts = 30;     // 30 × 20s = 10 min
            const sleepMs     = 20000;

            for (let i = 1; i <= maxAttempts; i++) {
              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: pr,
              });
              const copilotReview = reviews
                .filter(r => (r.user?.login || '').toLowerCase().includes('opilot'))
                .pop();

              if (copilotReview) {
                core.info(`✅ Copilot review found (id=${copilotReview.id}, commit=${copilotReview.commit_id?.slice(0,7)}) on attempt ${i}`);
                core.setOutput('found', 'true');
                return;
              }
              core.info(`⏳ attempt ${i}/${maxAttempts} — no Copilot review yet for ${headSha.slice(0,7)}, sleeping ${sleepMs/1000}s`);
              await new Promise(r => setTimeout(r, sleepMs));
            }
            core.setOutput('found', 'false');
            core.warning('Timed out waiting for Copilot review');

      - name: Set up Python
        if: steps.wait.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Process Copilot review
        if: steps.wait.outputs.found == 'true'
        env:
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          REPO:           ${{ github.repository }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
          HEAD_SHA:       ${{ github.event.pull_request.head.sha }}
          REVIEWER_LOGIN: copilot-pull-request-reviewer
        run: python3 .github/scripts/process_copilot_review.py

      - name: Mark timeout as failure
        if: steps.wait.outputs.found != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              context: 'SQL Review Tier',
              state: 'failure',
              description: '❌ Timed out waiting for Copilot — re-run workflow',
            });
            core.setFailed('Copilot review did not arrive within timeout');
