# Owned by ADUSA-Digital Platform Engineering
# Version: 3.0.0 — May 2026
# SQL PR review pipeline — Copilot is the sole reviewer.
#
# Architecture (single source of truth = Copilot):
#   1. PR opened on `.sql` files → request Copilot as reviewer
#      (also auto-added by the "Require Copilot Review" branch ruleset)
#   2. Copilot reviews using:
#        .github/copilot-instructions.md
#        .github/instructions/sql.instructions.md  (applyTo: **/*.sql)
#      and prefixes each finding with [HARD_BLOCK] or [DBA_REVIEW]
#      plus a tier marker on the first line of its summary.
#   3. When Copilot submits → process_copilot_review.py parses the review,
#      applies the tier label (sql-hard-block | dba-review-required | sql-scan-clean),
#      and posts a "SQL Review Tier" status check that gates merge.
#
# No GitHub Models / GPT-4o / regex scan. Copilot's review is the only source
# of findings; this workflow only labels and gates based on what Copilot says.

name: sql-pr-scan

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
    paths:
      - '**/*.sql'

  pull_request_review:
    types: [submitted, edited, dismissed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 — Request Copilot as reviewer (only on the pull_request event)
  # ---------------------------------------------------------------------------
  request-copilot-review:
    if: github.event_name == 'pull_request'
    name: Request Copilot as reviewer
    runs-on: ubuntu-latest
    steps:
      - name: Add Copilot to reviewers
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_REVIEWER_PAT }}
          script: |
            const pr = context.payload.pull_request.number;
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: pr,
                reviewers: ['Copilot'],
              });
              core.info('✅ Copilot review requested');
            } catch (err) {
              core.warning('Could not request Copilot via API: ' + err.message);
            }

      - name: Set status check to pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              context: 'SQL Review Tier',
              state: 'pending',
              description: '⏳ Waiting for Copilot to submit review',
            });

  # ---------------------------------------------------------------------------
  # JOB 2 — Parse Copilot's review → label + status check (gates merge)
  # Runs only when Copilot submits/edits/dismisses a review on a PR that
  # touches .sql files.
  # ---------------------------------------------------------------------------
  process-copilot-review:
    if: |
      github.event_name == 'pull_request_review' &&
      startsWith(github.event.review.user.login, 'Copilot')
    name: SQL Review Tier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PR touches .sql files
        id: sql-check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: pr }
            );
            const has_sql = files.some(f => f.filename.endsWith('.sql'));
            core.setOutput('has_sql', has_sql ? 'true' : 'false');

      - name: Set up Python
        if: steps.sql-check.outputs.has_sql == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Process Copilot review
        if: steps.sql-check.outputs.has_sql == 'true'
        env:
          GITHUB_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          REPO:           ${{ github.repository }}
          PR_NUMBER:      ${{ github.event.pull_request.number }}
          HEAD_SHA:       ${{ github.event.pull_request.head.sha }}
          REVIEWER_LOGIN: Copilot
        run: python3 .github/scripts/process_copilot_review.py
