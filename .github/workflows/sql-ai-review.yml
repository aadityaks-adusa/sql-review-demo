# Owned by ADUSA-Digital Platform Engineering
# Version: 2.0.0 — Updated April 2026
# SQL AI Review — AI-first SQL PR review pipeline using GitHub Models (GPT-4o).
#
# NO hardcoded regex rules. All SQL analysis is done by the AI.
# Rules live in plain English in:
#   .github/copilot-instructions.md  (Copilot code review — ≤4000 chars)
#   .github/instructions/sql.instructions.md  (per-rule detail table — easy to edit)
#   .github/scripts/sql_review_prompt.md  (full system prompt for GPT-4o)
#
# Two parallel tracks:
#   Track A: GitHub Copilot code review — posts inline comments as a formal PR reviewer
#            (Copilot always posts COMMENT-type; cannot block merges — this is a platform limit)
#   Track B: GitHub Models GPT-4o → enforce.py → REQUEST_CHANGES + exit 1 on HARD_BLOCK
#            This is the enforcement gate that can actually block merges.
#
# Tier 1 (HARD_BLOCK): PR check fails (exit 1)
# Tier 2 (DBA_REVIEW): PR check passes, DBA required (EDA team + label)
# Tier 3 (CLEAN):      PR check passes, auto-approve eligible
#
# Rules derived from analysis of 1,190 commits across all branches and 429 SQL files.
# See .github/docs/SQL_PR_Review_Automation_Confluence.md for full rule reasoning.

name: sql-pr-scan

on:
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
    paths:
      - '**/*.sql'

permissions:
  contents: read
  pull-requests: write    # post PR reviews + request reviewers
  issues: write           # add labels
  models: read            # GitHub Models API — no extra secrets needed

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 — Request GitHub Copilot as a formal PR reviewer
  #
  # Copilot appears in the Reviewers panel (same as a human reviewer) and posts
  # inline review comments on the diff lines, guided by:
  #   .github/copilot-instructions.md
  #   .github/instructions/sql.instructions.md  (applyTo: **/*.sql)
  #
  # Platform limitation: Copilot always posts COMMENT-type reviews, not
  # REQUEST_CHANGES. It cannot block merges. Job 2 (enforce) is the gate.
  #
  # If this call fails (Copilot review not enabled on the repo/plan), enable it
  # natively: Settings → Rules → Rulesets → "Automatically request Copilot code review"
  # ---------------------------------------------------------------------------
  request-copilot-review:
    name: Request Copilot as reviewer
    runs-on: ubuntu-latest
    steps:
      - name: Add Copilot to reviewers
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request.number;
            core.info(`Requesting Copilot review on PR #${pr}`);
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: pr,
                reviewers: ['Copilot'],
              });
              core.info('✅ Copilot review requested — check the Reviewers panel');
            } catch (err) {
              core.warning('⚠️  Could not request Copilot via API: ' + err.message);
              core.warning('Enable via: Settings → Rules → Rulesets → Automatically request Copilot code review');
            }

  # ---------------------------------------------------------------------------
  # JOB 2 — AI enforcement pipeline
  #
  # Step 1: ai_sql_reviewer.py — calls GitHub Models GPT-4o with the full diff
  #         and the sql_review_prompt.md system prompt. No hardcoded SQL regex.
  #         Python only does path-based file type classification + git diff retrieval.
  #         Output: /tmp/review.json
  #
  # Step 2: enforce.py — reads review.json, posts a formal GitHub PR review
  #         (REQUEST_CHANGES or APPROVE), adds labels, exits 1 on HARD_BLOCK.
  #
  # Safety: if the AI is unavailable → HARD_BLOCK (not silent pass-through).
  # ---------------------------------------------------------------------------
  sql-ai-review:
    name: SQL AI Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "Step 1 — AI SQL Review (GitHub Models · GPT-4o)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SQL_REVIEW_OUTPUT: /tmp/review.json
        run: python3 .github/scripts/ai_sql_reviewer.py

      - name: "Step 2 — Enforce (post review · label · gate)"
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQL_SCAN_REVIEW_FILE: /tmp/review.json
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/scripts/enforce.py
