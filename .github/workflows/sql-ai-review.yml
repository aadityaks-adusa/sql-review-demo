name: SQL AI Review — Copilot-Powered

on:
  pull_request:
    paths: ["**/*.sql"]
    branches: [main]
    types: [opened, synchronize, reopened]

# Permissions required for posting reviews, labels, and GitHub Models API
permissions:
  contents: read
  pull-requests: write    # post PR reviews (REQUEST_CHANGES / APPROVE) + request reviewers
  issues: write           # add labels
  models: read            # GitHub Models API via GITHUB_TOKEN — no extra secrets needed

jobs:

  # ---------------------------------------------------------------------------
  # JOB 0 — Request GitHub Copilot as a formal PR reviewer
  #
  # This makes Copilot appear in the "Reviewers" panel (not as a conversation
  # comment) and post inline review comments directly on the diff lines.
  # Copilot reads .github/copilot-instructions.md and
  # .github/instructions/sql.instructions.md automatically.
  #
  # If the API call fails (Copilot review not enabled on this repo/org plan),
  # enable it via: Settings → Rules → Rulesets → "Automatically request
  # Copilot code review" — that's the official native configuration path.
  # ---------------------------------------------------------------------------
  request-copilot-review:
    name: Request Copilot as reviewer
    runs-on: ubuntu-latest
    steps:
      - name: Add github-copilot[bot] to reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            core.info(`Requesting Copilot review on PR #${pr}`);
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                pull_number: pr,
                reviewers: ['Copilot'],
              });
              core.info('✅ Copilot review requested — check the Reviewers panel');
            } catch (err) {
              // Non-fatal: Copilot review may already be configured via Rulesets,
              // or the plan may not allow API-based reviewer assignment.
              core.warning('⚠️  Could not request Copilot via API: ' + err.message);
              core.warning('Enable automatic Copilot review via repo Settings → Rules → Rulesets');
            }

  # ---------------------------------------------------------------------------
  # JOB 1 — AI enforcement pipeline (GitHub Models GPT-4o → enforce.py)
  #
  # Copilot's review is advisory (COMMENT-type, cannot block merges).
  # This job runs the same rules through GPT-4o and posts a blocking
  # REQUEST_CHANGES review for HARD_BLOCK issues — that's the enforcement gate.
  # ---------------------------------------------------------------------------
  sql-ai-review:
    name: sql-ai-review
    runs-on: ubuntu-latest

    steps:
      # Full history required so git diff can see the base commit
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # STEP 1 — AI Review
      # GitHub Models (GPT-4o) reads the full diff and applies the SQL rules
      # from .github/scripts/sql_review_prompt.md (same rules as copilot-instructions.md)
      # Output: /tmp/review.json
      # -----------------------------------------------------------------------
      - name: "Step 1 — AI SQL Review (GitHub Models · GPT-4o)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SQL_REVIEW_OUTPUT: /tmp/review.json
        run: python3 .github/scripts/ai_sql_reviewer.py

      # -----------------------------------------------------------------------
      # STEP 2 — Enforce
      # Reads review.json → posts PR review → adds label → exits 1 on HARD_BLOCK
      # Runs even if Step 1 fails (safety block)
      # -----------------------------------------------------------------------
      - name: "Step 2 — Enforce (post review · label · gate)"
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SQL_SCAN_REVIEW_FILE: /tmp/review.json
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/enforce.py
